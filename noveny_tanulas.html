let idx=0,isRevealed=false;
function showCard() {
  const p = plants[idx];
  document.getElementById('latin').innerHTML = p.latin;
  document.getElementById('magyar').innerHTML = p.magyar;
  const imgs = p.images.map(i => `<img src="noveny_kepek/` + i + `" alt="` + p.latin + `">`).join('');
  document.getElementById('images').innerHTML = imgs;
  document.getElementById('progress').innerHTML = (idx+1) + ' / ' + plants.length;
  isRevealed = false;
  updateCardState();
}
function revealToggle() {
  isRevealed = !isRevealed;
  updateCardState();
}
function updateCardState() {
  const container = document.getElementById('nameContainer');
  const revealBtn = document.getElementById('revealBtn');
  const emoji = container.querySelector('.emoji');
  const names = container.querySelector('.names');

  if (isRevealed) {
    container.className = 'name-container names-only';
    names.style.display = 'block';
    emoji.style.display = 'none';
    revealBtn.innerHTML = '🙈 Név elrejtése';
    revealBtn.classList.add('reveal-btn');
  } else {
    container.className = 'name-container emoji-only';
    names.style.display = 'none';
    emoji.style.display = 'block';
    revealBtn.innerHTML = '🔍 Név megmutatása';
    revealBtn.classList.remove('reveal-btn');
  }
}
function next() {
  idx = (idx + 1) % plants.length;
  showCard();
}
function prev() {
  idx = (idx - 1 + plants.length) % plants.length;
  showCard();
}
function shuffle() {
  for(let i = plants.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * i);
    [plants[i], plants[j]] = [plants[j], plants[i]];
  }
  idx = 0;
  showCard();
}
showCard();
</script>
